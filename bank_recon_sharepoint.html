async function getDigest(){
  if(_digest&&Date.now()<_digestExp) return _digest;
  try{
    const r=await fetch(`${SP_URL}/_api/contextinfo`,{method:"POST",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata"},credentials:"include"});
    const d=await r.json();_digest=d.FormDigestValue;_digestExp=Date.now()+25*60*1000;return _digest;
  }catch(e){return null;}
}
async function spGet(l,f="",top=500){
  try{
    let url=`${SP_URL}/_api/web/lists/getbytitle('${l}')/items?$top=${top}`;
    if(f) url+=`&$filter=${f}`;
    const r=await fetch(url,{headers:{"Accept":"application/json;odata=nometadata"},credentials:"include"});
    if(!r.ok) return null;
    return (await r.json()).value||[];
  }catch(e){return null;}
}
async function spAdd(l,data){
  try{
    const d=await getDigest();if(!d)return null;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items`,{method:"POST",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d},body:JSON.stringify(data)});
    if(!r.ok)return null;return await r.json();
  }catch(e){return null;}
}
async function spUpdate(l,id,data){
  try{
    const d=await getDigest();if(!d)return false;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items(${id})`,{method:"MERGE",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d,"IF-MATCH":"*"},body:JSON.stringify(data)});
    return r.ok||r.status===204;
  }catch(e){return false;}
}
async function spDelete(l,id){
  try{
    const d=await getDigest();if(!d)return false;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items(${id})`,{method:"DELETE",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d,"IF-MATCH":"*"}});
    return r.ok||r.status===204;
  }catch(e){return false;}
}
async function ensureCol(l,col,type=2){
  try{const d=await getDigest();if(!d)return;await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/fields`,{method:"POST",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d},body:JSON.stringify({"__metadata":{"type":"SP.Field"},"FieldTypeKind":type,"Title":col})});}catch(e){}
}
async function setupLists(){
  if(S.spStatus!=="ok")return;
  for(const c of ["Keyword","JournalType","AccountType","AccountNo","BalAccountType","BalAccountNo","Entity","EntityAcct","AddedBy"])
    await ensureCol("BankReconRules",c);
  for(const l of ["BankReconVendors","BankReconCustomers","BankReconGL"])
    for(const c of ["ItemNo","ItemName","Entity","Currency","AddedBy","AddedAt","ApprovedBy","Status"])
      await ensureCol(l,c);
  for(const c of ["TxnDate","Description","RawDesc","CleanDesc","Amount","TxnType","Currency","Reference","BankAccount","Entity","EntityAcct","Status","RowColor","AccountType","AccountNo","BalAccountType","BalAccountNo","DocumentType","Confidence","MatchedRule","IsDup","IsSplit","BookedBy","BookedAt","AddedBy","Locked"])
    await ensureCol("BankReconTransactions",c);
  for(const c of ["FileName","TxnCount","Skipped","Unmatched","UploadedBy","SessionDate"])
    await ensureCol("BankReconSessions",c);
  for(const c of ["ItemNo","ItemName","Entity","Currency","AddedBy","AddedAt","PendingType"])
    await ensureCol("BankReconPending",c);
  for(const c of ["AlertType","Message","AlertTime","AlertUser","IsRead"])
    await ensureCol("BankReconAlerts",c);
}
async function syncFromSP(){
  if(S.spStatus!=="ok")return;
  S.syncing=true;renderTopbar();
  const rules=await spGet("BankReconRules");
  if(rules){S.rules=rules.map(i=>({id:String(i.Id),spId:i.Id,name:i.Title||"",descContains:i.Keyword||"",type:i.JournalType||"",accountType:i.AccountType||"Vendor",accountNo:i.AccountNo||"",balAccountType:i.BalAccountType||"Bank Account",balAccountNo:i.BalAccountNo||"",entity:i.Entity||"",entityAcct:i.EntityAcct||"",addedBy:i.AddedBy||""}));ls("brp3_rules",S.rules);}
  const vendors=await spGet("BankReconVendors","Status eq 'approved'");
  if(vendors){S.vendors=vendors.map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",approvedBy:i.ApprovedBy||""}));ls("brp3_vendors",S.vendors);}
  const customers=await spGet("BankReconCustomers","Status eq 'approved'");
  if(customers){S.customers=customers.map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",approvedBy:i.ApprovedBy||""}));ls("brp3_customers",S.customers);}
  const gl=await spGet("BankReconGL","Status eq 'approved'");
  if(gl){S.glAccounts=gl.map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",approvedBy:i.ApprovedBy||""}));ls("brp3_gl",S.glAccounts);}
  const pending=await spGet("BankReconPending");
  if(pending){
    S.pendingVendors=pending.filter(i=>i.PendingType==="vendor").map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",addedAt:i.AddedAt||""}));
    S.pendingCustomers=pending.filter(i=>i.PendingType==="customer").map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",addedAt:i.AddedAt||""}));
    S.pendingGL=pending.filter(i=>i.PendingType==="gl").map(i=>({id:String(i.Id),spId:i.Id,no:i.ItemNo||"",name:i.ItemName||"",entity:i.Entity||"",currency:i.Currency||"",addedBy:i.AddedBy||"",addedAt:i.AddedAt||""}));
  }
  const txns=await spGet("BankReconTransactions","",2000);
  if(txns&&txns.length>0){
    S.txns=txns.map(i=>({id:String(i.Id),spId:i.Id,date:i.TxnDate||"",description:i.Description||"",rawDesc:i.RawDesc||"",cleanDesc:i.CleanDesc||"",amount:parseFloat(i.Amount)||0,type:i.TxnType||"",currency:i.Currency||"",reference:i.Reference||"",bankAccount:i.BankAccount||"",entity:i.Entity||"",entityAcct:i.EntityAcct||"",status:i.Status||"pending",rowColor:i.RowColor||"red",accountType:i.AccountType||"",accountNo:i.AccountNo||"",balAccountType:i.BalAccountType||"Bank Account",balAccountNo:i.BalAccountNo||"",documentType:i.DocumentType||"",confidence:parseInt(i.Confidence)||0,matchedRule:i.MatchedRule||"",isDup:i.IsDup==="true",isSplit:i.IsSplit==="true",locked:i.Locked==="true",bookedBy:i.BookedBy||"",bookedAt:i.BookedAt||"",addedBy:i.AddedBy||""}));
    ls("brp3_txns",S.txns);
  }
  const sessions=await spGet("BankReconSessions");
  if(sessions){S.sessions=sessions.map(i=>({id:String(i.Id),date:i.SessionDate||"",file:i.FileName||"",count:parseInt(i.TxnCount)||0,skipped:parseInt(i.Skipped)||0,unmatched:parseInt(i.Unmatched)||0,uploadedBy:i.UploadedBy||""}));ls("brp3_sessions",S.sessions);}
  const alerts=await spGet("BankReconAlerts");
  if(alerts){S.alerts=alerts.map(i=>({id:String(i.Id),spId:i.Id,type:i.AlertType||"info",msg:i.Message||"",time:i.AlertTime||"",user:i.AlertUser||"",read:i.IsRead==="true"}));ls("brp3_alerts",S.alerts);}
  S.syncing=false;render();
}
async function spSaveRule(rule){
  if(S.spStatus!=="ok")return rule.id;
  const res=await spAdd("BankReconRules",{Title:rule.name,Keyword:rule.descContains,JournalType:rule.type,AccountType:rule.accountType,AccountNo:rule.accountNo,BalAccountType:rule.balAccountType,BalAccountNo:rule.balAccountNo,Entity:rule.entity,EntityAcct:rule.entityAcct||"",AddedBy:S.user?.name||""});
  return res?String(res.Id):rule.id;
}
async function spDeleteRule(rule){if(S.spStatus!=="ok"||!rule.spId)return;await spDelete("BankReconRules",rule.spId||rule.id);}
async function spSaveMasterItem(l,item,status="approved"){
  if(S.spStatus!=="ok")return item.id;
  const res=await spAdd(l,{Title:item.name,ItemNo:item.no,ItemName:item.name,Entity:item.entity,Currency:item.currency||"",AddedBy:item.addedBy||"",AddedAt:item.addedAt||"",Status:status});
  return res?String(res.Id):item.id;
}
async function spSavePending(item,type){
  if(S.spStatus!=="ok")return item.id;
  const res=await spAdd("BankReconPending",{Title:item.name,ItemNo:item.no,ItemName:item.name,Entity:item.entity,Currency:item.currency||"",AddedBy:item.addedBy||"",AddedAt:item.addedAt||"",PendingType:type,Status:"pending"});
  return res?String(res.Id):item.id;
}
async function spDeletePending(id){if(S.spStatus!=="ok")return;await spDelete("BankReconPending",id);}
async function spSaveTxns(txns){
  if(S.spStatus!=="ok")return;
  for(const t of txns){
    const data={Title:(t.description||"").slice(0,255),TxnDate:t.date,Description:(t.description||"").slice(0,255),RawDesc:(t.rawDesc||"").slice(0,255),CleanDesc:(t.cleanDesc||"").slice(0,255),Amount:String(t.amount),TxnType:t.type,Currency:t.currency,Reference:t.reference||"",BankAccount:t.bankAccount,Entity:t.entity,EntityAcct:t.entityAcct||"",Status:t.status,RowColor:t.rowColor,AccountType:t.accountType||"",AccountNo:t.accountNo||"",BalAccountType:t.balAccountType||"",BalAccountNo:t.balAccountNo||"",DocumentType:t.documentType||"",Confidence:String(t.confidence||0),MatchedRule:t.matchedRule||"",IsDup:String(t.isDup||false),IsSplit:String(t.isSplit||false),Locked:String(t.locked||false),BookedBy:t.bookedBy||"",BookedAt:t.bookedAt||"",AddedBy:S.user?.name||""};
    if(t.spId) await spUpdate("BankReconTransactions",t.spId,data);
    else{const res=await spAdd("BankReconTransactions",data);if(res)t.spId=res.Id;}
  }
}
async function spSaveSession(sess){if(S.spStatus!=="ok")return;await spAdd("BankReconSessions",{Title:sess.file,FileName:sess.file,TxnCount:String(sess.count),Skipped:String(sess.skipped),Unmatched:String(sess.unmatched),UploadedBy:sess.uploadedBy||"",SessionDate:sess.date});}
async function spSaveAlert(a){if(S.spStatus!=="ok")return;await spAdd("BankReconAlerts",{Title:(a.msg||"").slice(0,255),AlertType:a.type,Message:(a.msg||"").slice(0,255),AlertTime:a.time,AlertUser:a.user||"",IsRead:"false"});}

async function initSP(){
  const ok=await spReady();
  if(ok){await setupLists();await syncFromSP();}
  else render();
}

// INIT

window.onload=()=>{
  // MIGRATE data from v2 keys to v3 keys (one-time migration)
  if(!ll("brp3_migrated",false)){
    var migrate = function(oldKey, newKey){
      var old = ll(oldKey, null);
      if(old && Array.isArray(old) && old.length>0 && !ll(newKey,null)){
        // Add id field if missing
        var fixed = old.map(function(item,i){ return Object.assign({id:"m-migrate-"+i}, item); });
        ls(newKey, fixed);
        console.log("Migrated "+fixed.length+" items from "+oldKey+" to "+newKey);
      }
    };
    migrate("brp2_vendors","brp3_vendors");
    migrate("brp2_customers","brp3_customers");
    migrate("brp2_gl","brp3_gl");
    migrate("brp2_rules","brp3_rules");
    migrate("brp2_memory","brp3_memory");
    migrate("brp2_bookings","brp3_bookings");
    migrate("brp2_sessions","brp3_sessions");
    migrate("brp2_alerts","brp3_alerts");
    ls("brp3_migrated", true);
    console.log("Migration complete!");
  }
  // Load saved users but always merge with defaults so new default users appear
  const saved=ll("brp3_users",null);
  if(saved&&Array.isArray(saved)&&saved.length>0) USERS=saved;
  else USERS=DEFAULT_USERS.map(u=>({...u}));
  // Check for existing session
  if(checkSession()){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="flex";
    loadState();render();initSP();
  } else {
    const u=document.getElementById("lu");
    if(u) u.focus();
  }
};
