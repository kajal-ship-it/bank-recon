async function saveAndLearn(id){
  const t=S.txns.find(x=>x.id===id);if(!t) return;
  if(!t.accountNo){alert("Please set an Account No. first.");return;}
  S.txns=S.txns.map(x=>x.id===id?{...x,status:"approved",rowColor:"green"}:x);
  S.editId=null;
  const rule={id:`rule-${Date.now()}`,name:`Auto: ${t.rawDesc.slice(0,30)}`,descContains:t.rawDesc.slice(0,25),
    type:t.type,accountType:t.accountType,accountNo:t.accountNo,
    balAccountType:t.balAccountType,balAccountNo:t.balAccountNo,
    entity:t.entity,entityAcct:t.entityAcct||""};
  S.rules=[...S.rules,rule];
  ls("brp3_rules",S.rules);
  audit("RULE_AUTO",rule.name+" for "+t.entity);
  spSaveRule(rule);
  // Auto-apply to other matching pending transactions
  var reapplied2=0;
  S.txns=S.txns.map(function(tx){
    if(tx.id===id) return tx; // already handled above
    if(tx.locked||tx.status==="booked"||tx.status==="rejected"||tx.status==="voided") return tx;
    if(rule.entity&&rule.entity!==tx.entity) return tx;
    var kw3=rule.descContains.toLowerCase().trim();
    function kwM3(h,n){if(!h||!n)return false;if(h===n)return true;return h.indexOf(n)>=0&&(h===n||h.startsWith(n+" ")||h.startsWith(n+"|")||h.endsWith(" "+n)||h.endsWith("|"+n)||h.indexOf(" "+n+" ")>=0||h.indexOf("|"+n)>=0||(n.length>8&&h.indexOf(n)>=0));}
    var d3=(tx.description||"").toLowerCase(),r3=(tx.rawDesc||"").toLowerCase(),c3=(tx.cleanDesc||"").toLowerCase();
    var match=kwM3(d3,kw3)||kwM3(r3,kw3)||kwM3(c3,kw3);
    if(match){
      reapplied2++;
      return Object.assign({},tx,{accountType:rule.accountType,accountNo:rule.accountNo,
        balAccountType:rule.balAccountType,balAccountNo:rule.balAccountNo,
        confidence:80,matchedRule:rule.name,status:"approved",rowColor:"green"});
    }
    return tx;
  });
  if(reapplied2>0){
    addAlert("info","Rule auto-applied to "+reapplied2+" more matching transactions");
  }
  saveSession();render();
}

async function saveRule(){
  const r=S.newRule;
  if(!r.name||!r.descContains){S.ruleMsg="⚠ Fill in Rule Name and Keyword.";render();return;}
  const rule={...r,id:`rule-${Date.now()}`};
  const spId=await spSaveRule(rule);
  rule.spId=spId;
  S.rules=[...S.rules,rule];
  ls("brp3_rules",S.rules);
  audit("RULE_ADD",`${rule.name}`);
  // Auto-apply new rule to ALL matching pending/flagged transactions
  var reapplied=0;
  S.txns=S.txns.map(function(t){
    // Skip locked, booked, rejected, voided
    if(t.locked||t.status==="booked"||t.status==="rejected"||t.status==="voided") return t;
    // Skip if rule is entity-specific and doesn't match
    if(rule.entity&&rule.entity!==t.entity) return t;
    if(rule.entityAcct&&rule.entityAcct!==t.entityAcct) return t;
    // Skip if rule is type-specific and doesn't match
    if(rule.type&&rule.type!==t.type) return t;
    // Check keyword against description, rawDesc AND cleanDesc
    // Strict match: full word/phrase match, not loose substring
    var keyword=rule.descContains.toLowerCase().trim();
    var desc=(t.description||"").toLowerCase();
    var raw=(t.rawDesc||"").toLowerCase();
    var clean=(t.cleanDesc||"").toLowerCase();
    function kwMatch(h,n){
      if(!h||!n) return false;
      if(h===n) return true;
      // Check as whole word: surrounded by spaces, start, end, or | separator
      return h.indexOf(n)>=0 && (
        h===n ||
        h.startsWith(n+" ")||h.startsWith(n+"|")||
        h.endsWith(" "+n)||h.endsWith("|"+n)||
        h.indexOf(" "+n+" ")>=0||h.indexOf("|"+n+"|")>=0||
        h.indexOf(" "+n+"|")>=0||h.indexOf("|"+n+" ")>=0
      );
    }
    if(keyword&&(kwMatch(desc,keyword)||kwMatch(raw,keyword)||kwMatch(clean,keyword)||
      // Also allow if keyword is long enough (>8 chars) to be specific
      (keyword.length>8&&(desc.indexOf(keyword)>=0||raw.indexOf(keyword)>=0||clean.indexOf(keyword)>=0))
    )){
      reapplied++;
      return Object.assign({},t,{
        accountType:rule.accountType, accountNo:rule.accountNo,
        balAccountType:rule.balAccountType, balAccountNo:rule.balAccountNo,
        confidence:80, matchedRule:rule.name,
        status:"approved", rowColor:"green"
      });
    }
    return t;
  });
  saveSession();
  S.newRule={name:"",descContains:"",entity:"",entityAcct:"",type:"",accountType:"Vendor",accountNo:"",balAccountType:"Bank Account",balAccountNo:""};
  S.ruleMsg="✅ Rule saved! Applied to "+reapplied+" existing transactions.";render();
  setTimeout(()=>{S.ruleMsg="";render();},4000);
}

function voidTxn(id){
  var t=S.txns.find(function(x){return x.id===id;});
  if(!t) return;
  var msg="Void this entry?\n\n";
  msg+="Date: "+t.date+"\n";
  msg+="Description: "+(t.cleanDesc||t.description)+"\n";
  msg+="Amount: "+fmtAmt(t.amount)+"\n\n";
  msg+="✅ Balance recalculates immediately\n";
  msg+="✅ Kept in history for audit\n";
  msg+="✅ Can be restored by admin\n";
  msg+="❌ Will NOT export to D365";
  if(!confirm(msg)) return;
  S.txns=S.txns.map(function(x){
    return x.id===id?Object.assign({},x,{status:"voided",rowColor:"grey",locked:false,voidedBy:S.user.name,voidedAt:new Date().toLocaleString()}):x;
  });
  // Also remove from bookings so balance updates
  S.bookings=S.bookings.map(function(x){
    return x.id===id?Object.assign({},x,{status:"voided",voidedBy:S.user.name}):x;
  });
  ls("brp3_bookings",S.bookings);
  audit("VOID",t.date+" | "+t.entity+" | "+fmtAmt(t.amount)+" | "+(t.cleanDesc||t.description));
  addAlert("info",S.user.name+" voided: "+(t.cleanDesc||t.description)+" | "+fmtAmt(t.amount)+" | "+t.entity);
  saveSession();render();
}

function undoVoid(id){
  S.txns=S.txns.map(function(x){
    return x.id===id?Object.assign({},x,{status:"pending",rowColor:"red",voidedBy:null}):x;
  });
  audit("UNDO_VOID","Entry "+id+" restored");
  saveSession();render();
}

function splitTxn(id){
  const t=S.txns.find(x=>x.id===id);if(!t)return;
  const count=parseInt(prompt(`Split "${t.description.slice(0,40)}" (${fmtAmt(t.amount)}) into how many lines?`))||0;
  if(count<2||count>20)return;
  const splits=[];
  for(let i=0;i<count;i++){
    const amt=parseFloat(prompt(`Line ${i+1} amount (total=${fmtAmt(t.amount)}):`)||"0")||0;
    const acct=prompt(`Line ${i+1} Account No.:`)||"";
    const type=prompt(`Line ${i+1} Account Type (Vendor/Customer/G/L Account):`)||"Vendor";
    splits.push({...t,id:`${t.id}-s${i}`,amount:amt,accountNo:acct,accountType:type,isSplit:true,locked:false});
  }
  const total=splits.reduce((s,x)=>s+x.amount,0);
  if(Math.abs(total-t.amount)>0.01){alert(`Split amounts (${fmtAmt(total)}) don't match original (${fmtAmt(t.amount)}).`);return;}
  S.txns=S.txns.flatMap(x=>x.id===id?splits:[x]);
  saveSession();render();
}

let _digest=null,_digestExp=0;
async function graphFetch(path, opts){
  const token = await getSpToken();
  if(!token) return null;
  const headers = {"Authorization":"Bearer "+token,"Content-Type":"application/json","Accept":"application/json",...(opts&&opts.headers||{})};
  try{
    const r = await fetch(GRAPH_URL+path, {...opts, headers});
    if(!r.ok){ console.warn("Graph error", r.status, path); return null; }
    if(r.status===204) return {ok:true};
    return await r.json();
  }catch(e){ console.warn("Graph fetch error:", e); return null; }
}

async function getSiteId(){
  if(GRAPH_SITE_ID) return GRAPH_SITE_ID;
  const d = await graphFetch("/sites/"+SITE_HOSTNAME+":"+SITE_PATH);
  if(d && d.id){ GRAPH_SITE_ID=d.id; return GRAPH_SITE_ID; }
  return null;
}

async function getListId(listName){
  const siteId = await getSiteId();
  if(!siteId) return null;
  const d = await graphFetch("/sites/"+siteId+"/lists?$filter=displayName eq '"+listName+"'&$select=id,displayName");
  if(d && d.value && d.value.length>0) return d.value[0].id;
  return null;
}

async function graphGetItems(listName, select, filter){
  const siteId = await getSiteId();
  if(!siteId) return null;
  const listId = await getListId(listName);
  if(!listId) return null;
  let url = "/sites/"+siteId+"/lists/"+listId+"/items?expand=fields";
  if(select) url += "&$select="+select;
  if(filter) url += "&$filter="+filter;
  url += "&$top=999";
  const d = await graphFetch(url);
  return d ? (d.value||[]).map(function(i){return {...i.fields, _id:i.id};}) : null;
}

async function graphAddItem(listName, fields){
  const siteId = await getSiteId();
  if(!siteId) return null;
  const listId = await getListId(listName);
  if(!listId) return null;
  const d = await graphFetch("/sites/"+siteId+"/lists/"+listId+"/items", {
    method:"POST", body:JSON.stringify({fields})
  });
  return d;
}

async function graphUpdateItem(listName, itemId, fields){
  const siteId = await getSiteId();
  if(!siteId) return null;
  const listId = await getListId(listName);
  if(!listId) return null;
  return graphFetch("/sites/"+siteId+"/lists/"+listId+"/items/"+itemId+"/fields", {
    method:"PATCH", body:JSON.stringify(fields)
  });
}

async function graphDeleteItem(listName, itemId){
  const siteId = await getSiteId();
  if(!siteId) return null;
  const listId = await getListId(listName);
  if(!listId) return null;
  return graphFetch("/sites/"+siteId+"/lists/"+listId+"/items/"+itemId, {method:"DELETE"});
}

async function spReady(){
  try{
    const token = await getSpToken();
    if(!token){ S.spStatus="local"; return false; }
    // Test Graph API connection
    const d = await graphFetch("/me?$select=displayName,mail");
    if(!d){ S.spStatus="local"; return false; }
    // Get site ID to confirm SharePoint access
    const siteId = await getSiteId();
    if(!siteId){ S.spStatus="local"; return false; }
    S.spStatus="ok";
    console.log("Graph API connected. Site ID:", siteId);
    return true;
  }catch(e){ S.spStatus="local"; return false; }
}
async function getDigest(){
  // Not needed with Graph API - keeping for compatibility
  return "graph-mode";
}
async function spGet(l,f,top){
  // Wrapper using Graph API
  return graphGetItems(l, null, f||null);

async function spAdd(l,data){
  try{
    const d=await getDigest();if(!d)return null;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items`,{method:"POST",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d},body:JSON.stringify(data)});
    if(!r.ok)return null;return await r.json();
  }catch(e){return null;}
}
async function spUpdate(l,id,data){
  try{
    const d=await getDigest();if(!d)return false;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items(${id})`,{method:"MERGE",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d,"IF-MATCH":"*"},body:JSON.stringify(data)});
    return r.ok||r.status===204;
  }catch(e){return false;}
}
async function spDelete(l,id){
  try{
    const d=await getDigest();if(!d)return false;
    const r=await fetch(`${SP_URL}/_api/web/lists/getbytitle('${l}')/items(${id})`,{method:"DELETE",credentials:"include",headers:{"Accept":"application/json;odata=nometadata","Content-Type":"application/json;odata=nometadata","X-RequestDigest":d,"IF-MATCH":"*"}});
    return r.ok||r.status===204;
  }catch(e){return false;}
}

async function pushAllToSP(){
  if(S.spStatus!=="ok"){
    alert("Not connected to SharePoint. Please sign in with Microsoft first.");
    return;
  }
  S.syncing=true; renderTopbar();
  addAlert("info","Graph API push started by "+S.user.name+"...");

  // Push in batches to avoid timeout
  var vpushed=0, gpushed=0, cpushed=0, rpushed=0;

  // Push vendors (batch of 50 at a time)
  for(var i=0;i<S.vendors.length;i++){
    var v=S.vendors[i];
    if(!v.spId){
      var res=await graphAddItem("BankReconVendors",{
        Title:v.name||v.no, ItemNo:v.no, ItemName:v.name,
        Entity:v.entity||"", Currency:v.currency||"",
        AddedBy:v.addedBy||S.user.name, ApprovedBy:v.approvedBy||S.user.name, Status:"approved"
      });
      if(res&&res.id){S.vendors[i].spId=res.id;vpushed++;}
    }
    if(i%50===0&&i>0){renderTopbar();await new Promise(r=>setTimeout(r,500));}
  }
  ls("brp3_vendors",S.vendors);

  // Push GL accounts
  for(var i=0;i<S.glAccounts.length;i++){
    var g=S.glAccounts[i];
    if(!g.spId){
      var res=await graphAddItem("BankReconGL",{
        Title:g.name||g.no, ItemNo:g.no, ItemName:g.name,
        Entity:g.entity||"", Currency:g.currency||"",
        AddedBy:g.addedBy||S.user.name, ApprovedBy:g.approvedBy||S.user.name, Status:"approved"
      });
      if(res&&res.id){S.glAccounts[i].spId=res.id;gpushed++;}
    }
    if(i%50===0&&i>0){renderTopbar();await new Promise(r=>setTimeout(r,500));}
  }
  ls("brp3_gl",S.glAccounts);

  // Push customers
  for(var i=0;i<S.customers.length;i++){
    var c=S.customers[i];
    if(!c.spId){
      var res=await graphAddItem("BankReconCustomers",{
        Title:c.name||c.no, ItemNo:c.no, ItemName:c.name,
        Entity:c.entity||"", Currency:c.currency||"",
        AddedBy:c.addedBy||S.user.name, ApprovedBy:c.approvedBy||S.user.name, Status:"approved"
      });
      if(res&&res.id){S.customers[i].spId=res.id;cpushed++;}
    }
  }
  ls("brp3_customers",S.customers);

  // Push rules
  for(var i=0;i<S.rules.length;i++){
    var r=S.rules[i];
    if(!r.spId){
      var res=await graphAddItem("BankReconRules",{
        Title:r.name, Keyword:r.descContains, JournalType:r.type||"",
        AccountType:r.accountType, AccountNo:r.accountNo,
        BalAccountType:r.balAccountType, BalAccountNo:r.balAccountNo,
        Entity:r.entity||"", EntityAcct:r.entityAcct||"",
        AddedBy:r.addedBy||S.user.name
      });
      if(res&&res.id){S.rules[i].spId=res.id;rpushed++;}
    }
  }
  ls("brp3_rules",S.rules);

  S.syncing=false;
  var msg="✅ Push complete via Microsoft Graph:\n"+vpushed+" vendors\n"+gpushed+" GL accounts\n"+cpushed+" customers\n"+rpushed+" rules\n\nAll team members will get this data automatically on login!";
  addAlert("info","Graph push complete: "+vpushed+"v "+gpushed+"g "+cpushed+"c "+rpushed+"r");
  alert(msg);
  render();
}

window.onload=()=>{
  // MIGRATE data from v2 keys to v3 keys (one-time migration)
  if(!ll("brp3_migrated",false)){
    var migrate = function(oldKey, newKey){
      var old = ll(oldKey, null);
      if(old && Array.isArray(old) && old.length>0 && !ll(newKey,null)){
        // Add id field if missing
        var fixed = old.map(function(item,i){ return Object.assign({id:"m-migrate-"+i}, item); });
        ls(newKey, fixed);
        console.log("Migrated "+fixed.length+" items from "+oldKey+" to "+newKey);
      }
    };
    migrate("brp2_vendors","brp3_vendors");
    migrate("brp2_customers","brp3_customers");
    migrate("brp2_gl","brp3_gl");
    migrate("brp2_rules","brp3_rules");
    migrate("brp2_memory","brp3_memory");
    migrate("brp2_bookings","brp3_bookings");
    migrate("brp2_sessions","brp3_sessions");
    migrate("brp2_alerts","brp3_alerts");
    ls("brp3_migrated", true);
    console.log("Migration complete!");
  }
  // Load saved users but always merge with defaults so new default users appear
  const saved=ll("brp3_users",null);
  if(saved&&Array.isArray(saved)&&saved.length>0) USERS=saved;
  else USERS=DEFAULT_USERS.map(u=>({...u}));
  // Check for existing session
  if(checkSession()){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="flex";
    loadState();render();initSP();
  } else {
    const u=document.getElementById("lu");
    if(u) u.focus();
  }
};
